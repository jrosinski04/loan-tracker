name: Aggressive Heartbeat
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Force Supabase Activity (Write Operation)
        # Added -k to fix Error 35
        # Using $(date) to send a fresh timestamp so the DB registers a change
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Prefer: resolution=merge-duplicates" \
          -d "{\"id\": 1, \"last_ping\": \"$TIMESTAMP\"}"

      - name: Wake up Streamlit (User Simulation)
        run: |
          
          APP_URL="https://loan-tracker.streamlit.app/" 
          
          for i in {1..3}; do
            echo "Ping attempt $i..."
            # -L: Follow redirects
            # --max-redirs 5: Prevent infinite loops
            # -b: Use a dummy cookie file (some servers require cookies to be enabled)
            # Headers: Mimic a real Chrome browser on Windows
            STATUS=$(curl -s -L --max-redirs 5 -o /dev/null -w "%{http_code}" \
              -b /tmp/cookies.txt -c /tmp/cookies.txt \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
              -H "Accept-Language: en-US,en;q=0.5" \
              -H "Upgrade-Insecure-Requests: 1" \
              -H "Sec-Fetch-Dest: document" \
              -H "Sec-Fetch-Mode: navigate" \
              -H "Sec-Fetch-Site: none" \
              -H "Sec-Fetch-User: ?1" \
              $APP_URL)
            
            echo "Response Status: $STATUS"
            
            if [ "$STATUS" == "200" ]; then
              echo "Success! The dashboard is awake."
              break
            fi
            sleep 15
          done

      - name: Install dependencies for Reminders
        run: pip install supabase resend

      - name: Run Payment Reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          # 1. Listing files
          echo "Current directory contents:"
          ls -R

          # 2. Extracting Hour
          HOUR=$(date +%H)
          echo "Current UTC Hour: $HOUR"

          # 3. Logic Check
          if [ "$HOUR" = "08" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Condition met. Starting reminders..."
            python -u reminders.py
          else
            echo "Skipping reminders: only runs at 08:00 UTC."
          fi
