name: Aggressive Heartbeat
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Force Supabase Activity (Write Operation)
        # Added -k to fix Error 35
        # Using $(date) to send a fresh timestamp so the DB registers a change
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Prefer: resolution=merge-duplicates" \
          -d "{\"id\": 1, \"last_ping\": \"$TIMESTAMP\"}"

      - name: Wake up Streamlit (User Simulation)
        run: |
          for i in {1..3}; do
            curl -fsSLk -o /dev/null -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" https://zbuk.org || true
            sleep 5
          done

      - name: Install dependencies for Reminders
        run: pip install supabase resend

      - name: Run Payment Reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          HOUR=$(date +%H)
          if ["$HOUR" == "08" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python reminders.py
          else
            echo "Skipping reminders: only runs at 08:00 UTC"
          fi
