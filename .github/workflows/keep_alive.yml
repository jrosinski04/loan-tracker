name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 0 * * 1,4' # Runs every Monday and Thursday at midnight
  workflow_dispatch: # Allows manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Database
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/loans?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"