name: Aggressive Heartbeat
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Force Supabase Activity (Write Operation)
        # Added -k to fix Error 35
        # Using $(date) to send a fresh timestamp so the DB registers a change
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Prefer: resolution=merge-duplicates" \
          -d "{\"id\": 1, \"last_ping\": \"$TIMESTAMP\"}"

      - name: Wake up Streamlit (User Simulation)
        run: |
          APP_URL="https://loan-tracker.streamlit.app/" 
          
          for i in {1..3}; do
            echo "Ping attempt $i..."
            # --max-redirs 5: Stops it from looping forever
            # -w "%{http_code}": Prints the HTTP status code (we want 200 or 302)
            # --head: Only fetches the headers (faster and less likely to trigger bot-protection)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --head --tlsv1.2 $APP_URL)
            echo "Response Status: $STATUS"
            
            if [ "$STATUS" == "200" ] || [ "$STATUS" == "302" ]; then
              echo "Success! App is awake."
              break
            fi
            sleep 10
          done

      - name: Install dependencies for Reminders
        run: pip install supabase resend

      - name: Run Payment Reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          # 1. Listing files
          echo "Current directory contents:"
          ls -R

          # 2. Extracting Hour
          HOUR=$(date +%H)
          echo "Current UTC Hour: $HOUR"

          # 3. Logic Check
          if [ "$HOUR" = "08" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Condition met. Starting reminders..."
            python -u reminders.py
          else
            echo "Skipping reminders: only runs at 08:00 UTC."
          fi
